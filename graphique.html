<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Graphique</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h2>Test de visibilité du graphique</h2>
    <div style="width: 80%; margin: auto; height: 400px; border: 2px solid red;">
        <canvas id="myChart"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('myChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Jour A', 'Jour B'],
                datasets: [{
                    label: 'Test',
                    data: [1000, 2000],
                    backgroundColor: 'blue'
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
        console.log("Le graphique de test a été dessiné.");
    </script>
</body>
</html>

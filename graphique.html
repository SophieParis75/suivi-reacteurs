<script>
        const dataJson = localStorage.getItem('graphData');
        console.log("Données brutes :", dataJson); // 1. Vérification des données

        if (dataJson) {
            try {
                const rawData = JSON.parse(dataJson);
                console.log("Données parsées :", rawData); // 2. Vérification du format

                const datasets = [{
                    data: rawData.map(item => ({
                        x: [item.dateDebut, item.dateFin],
                        y: item.asset,
                        valeur: item.unavailable
                    })),
                    backgroundColor: 'blue' // Temporaire pour test
                }];

                new Chart(document.getElementById('myChart'), {
                    type: 'bar',
                    data: { datasets: datasets },
                    options: {
                        indexAxis: 'y',
                        scales: { x: { type: 'time', time: { unit: 'day' } } }
                    }
                });
                console.log("Graphique généré !");
            } catch(err) {
                console.error("ERREUR CRITIQUE :", err);
                document.body.innerHTML += "<p style='color:red'>Erreur : " + err.message + "</p>";
            }
        } else {
            document.body.innerHTML += "<p>Aucune donnée trouvée dans le localStorage.</p>";
        }
    </script>

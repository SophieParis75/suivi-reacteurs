<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Graphique</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
</head>
<body>
    <div style="width: 800px; height: 400px;">
        <canvas id="myChart"></canvas>
    </div>

    <script>
        const rawData = JSON.parse(localStorage.getItem('graphData'));
        console.log("Données chargées :", rawData);

        new Chart(document.getElementById('myChart'), {
            type: 'bar',
            data: {
                datasets: [{
                    label: 'Test',
                    data: rawData.map(i => ({
                        x: [new Date(i.dateDebut), new Date(i.dateFin)],
                        y: i.asset
                    }))
                }]
            },
            options: {
                indexAxis: 'y',
                scales: {
                    x: { type: 'time' }
                }
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Affichage</title>
</head>
<body>
    <h1>Si vous voyez ce titre, le fichier est bien lu.</h1>
    <script>
        document.body.innerHTML += "<p>Le script JavaScript est en train de s'exécuter...</p>";
        const data = localStorage.getItem('graphData');
        if (data) {
            document.body.innerHTML += "<p style='color:green'>Données trouvées dans localStorage !</p>";
        } else {
            document.body.innerHTML += "<p style='color:red'>Aucune donnée trouvée dans localStorage.</p>";
        }
    </script>
</body>
</html>

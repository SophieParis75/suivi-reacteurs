<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Planning Indisponibilités</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/patternomaly"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
</head>
<body>
    <h2>Planning des Indisponibilités</h2>
    <div style="width: 95%; margin: auto; height: 600px;">
        <canvas id="myChart"></canvas>
    </div>

    <script>
        const rawData = JSON.parse(localStorage.getItem('graphData'));
        const config = {
            "BELLEVILLE 1": { pattern: 'diagonal', color: '#FF306B' },
            "BELLEVILLE 2": { pattern: 'diagonal', color: '#FFACC4' },
            "BLAYAIS 1": { pattern: 'solid', color: '#636D01' },
            "BLAYAIS 2": { pattern: 'solid', color: '#8B9434' },
            "BLAYAIS 3": { pattern: 'solid', color: '#C5C999' },
            "BLAYAIS 4": { pattern: 'solid', color: '#E3EDA3' },
            "BUGEY 2": { pattern: 'solid', color: '#E62B60' },
            "BUGEY 3": { pattern: 'solid', color: '#FF83A6' },
            "BUGEY 4": { pattern: 'solid', color: '#E6AAAF' },
            "BUGEY 5": { pattern: 'solid', color: '#FFD6E1' },
            "CATTENOM 1": { pattern: 'disc', color: '#636D01' },
            "CATTENOM 2": { pattern: 'disc', color: '#8B9434' },
            "CATTENOM 3": { pattern: 'disc', color: '#C5C999' },
            "CATTENOM 4": { pattern: 'disc', color: '#E2E4CC' },
            "CHOOZ 1": { pattern: 'diagonal', color: '#2097E6' },
            "CHOOZ 2": { pattern: 'diagonal', color: '#7CCBFF' },
            "CRUAS 1": { pattern: 'disc', color: '#2E2900' },
            "CRUAS 2": { pattern: 'disc', color: '#5C5833' },
            "CRUAS 3": { pattern: 'disc', color: '#ADAB99' },
            "CRUAS 4": { pattern: 'disc', color: '#D6D5CC' },
            "GOLFECH 1": { pattern: 'solid', color: '#2097E6' },
            "GOLFECH 2": { pattern: 'solid', color: '#7CCBFF' },
            "NOGENT 1": { pattern: 'disc', color: '#5C5833' },
            "NOGENT 2": { pattern: 'disc', color: '#ADAB99' },
            "ST ALBAN 1": { pattern: 'solid', color: '#332E00' },
            "ST ALBAN 2": { pattern: 'solid', color: '#858266' },
            "TRICASTIN 1": { pattern: 'disc', color: '#E62B60' },
            "TRICASTIN 2": { pattern: 'disc', color: '#FF5989' },
            "TRICASTIN 3": { pattern: 'disc', color: '#FFACC4' },
            "TRICASTIN 4": { pattern: 'disc', color: '#E6AAAF' }
        };

        new Chart(document.getElementById('myChart'), {
            type: 'bar',
            data: {
                datasets: [{
                    label: 'Indisponibilité (MW)',
                    data: rawData.map(i => ({
                        x: [new Date(i.dateDebut), new Date(i.dateFin)],
                        y: i.asset,
                        valeur: i.unavailable
                    })),
                    backgroundColor: rawData.map(item => {
                        const cfg = config[item.asset.toUpperCase()] || { pattern: 'solid', color: '#808080' };
                        return typeof patternomaly !== 'undefined' ? patternomaly.draw(cfg.pattern, cfg.color) : cfg.color;
                    })
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
    tooltip: {
        callbacks: {
            label: function(context) {
                // Utilisation de la date de début de la donnée source (plus sûr que getValueForPixel)
                const instantSurvole = new Date(context.raw.x[0]);
                const valeurReacteur = context.raw.valeur;
                
                let totalGlobal = 0;
                rawData.forEach(item => {
                    const dD = new Date(item.dateDebut).getTime();
                    const dF = new Date(item.dateFin).getTime();
                    // On vérifie si l'événement est actif à la date de début de la barre survolée
                    if (instantSurvole.getTime() >= dD && instantSurvole.getTime() <= dF) {
                        totalGlobal += item.unavailable;
                    }
                });

                return [
                    `Réacteur: ${valeurReacteur} MW`,
                    `Total parc: ${totalGlobal} MW`
                ];
            }
        }
    }
},

                return [
                    `Date ciblée: ${instantSurvole.toLocaleString('fr-FR', {day: '2-digit', month: '2-digit', hour: '2-digit', minute:'2-digit'})}`,
                    `Indisponibilité réacteur: ${valeurReacteur} MW`,
                    `Total parc indisponible: ${totalGlobal} MW`
                ];
            }
        }
    }
},

                                return [
                                    `Indisponibilité réacteur: ${valeurReacteur} MW`,
                                    `Total parc indisponible: ${totalGlobal} MW`
                                ];
                            }
                        }
                    }
                },
                scales: {
                    x: { 
                        type: 'time', 
                        time: { unit: 'day' }
                        // On supprime 'min' et 'max' pour laisser Chart.js s'adapter aux données
                    }
                }
            }

                                return [
                                    `Indisponibilité réacteur: ${valeurReacteur} MW`,
                                    `Total parc indisponible: ${totalGlobal} MW`
                                ];
                            }
                        }
                    }
                },
                scales: {
                    x: { 
                        type: 'time', 
                        time: { unit: 'day' },
                        min: new Date().toISOString(),
                        max: new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString()
                    }
                }
            }
        });
    </script>
</body>
</html>

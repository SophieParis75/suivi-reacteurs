<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Graphique</title>
    <!-- On charge uniquement Chart.js pour éliminer les conflits -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h2>Test d'affichage simple</h2>
    <div style="width: 500px; height: 300px;">
        <canvas id="myChart"></canvas>
    </div>

    <script>
        console.log("Le script a démarré");
        const ctx = document.getElementById('myChart');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Test'],
                datasets: [{ label: 'Essai', data: [10] }]
            }
        });
        console.log("Graphique de test créé");
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Graphique des Indisponibilités</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/patternomaly"></script>
</head>
<body>
    <h2>Indisponibilités nucléaires cumulées par jour</h2>
    <div style="width: 90%; margin: auto; height: 500px;">
        <canvas id="myChart"></canvas>
    </div>

    <script>
    console.log("Le script a démarré.");

    // Test de chargement des bibliothèques
    if (typeof Chart === 'undefined') {
        console.error("ERREUR : Chart.js n'est pas chargé !");
    } else {
        console.log("Chart.js est bien chargé.");
    }

    const dataJson = localStorage.getItem('graphData');
    console.log("Contenu de localStorage 'graphData' :", dataJson);

    if (dataJson) {
        try {
            const rawData = JSON.parse(dataJson);
            console.log("JSON bien parsé. Nombre d'éléments :", rawData.length);
            
            // ... (le reste de votre code de calcul des datasets) ...
            
            console.log("Tout semble prêt. Tentative de création du graphique...");
            
            new Chart(document.getElementById('myChart'), {
                type: 'bar',
                data: { labels: [], datasets: [] }, // Vide pour tester l'affichage
                options: { responsive: true }
            });
            console.log("Code d'initialisation du graphique exécuté.");
            
        } catch (e) {
            console.error("ERREUR lors du traitement des données :", e);
        }
    } else {
        console.error("ERREUR : Aucune donnée trouvée dans localStorage.");
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Graphique des Indisponibilités</title>
    <!-- Chargement de Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h2>Indisponibilités nucléaires cumulées par jour</h2>
    <div style="width: 80%; margin: auto;">
        <canvas id="myChart"></canvas>
    </div>

    <script>
        // Récupération des données depuis la mémoire
        const dataJson = localStorage.getItem('graphData');
        
        if (dataJson) {
            const rawData = JSON.parse(dataJson);

            // 1. Préparation des axes (Jours) et des catégories (Réacteurs)
            const getJour = (dateStr) => new Date(dateStr).toLocaleDateString('fr-FR');
            const dates = [...new Set(rawData.map(item => getJour(item.dateDebut)))].sort();
            const reacteurs = [...new Set(rawData.map(item => item.asset))];
            
            // 2. Construction des jeux de données (Datasets)
            // Chaque réacteur devient une "couche" de couleur différente
            const datasets = reacteurs.map((r, index) => ({
                label: r,
                data: dates.map(d => {
                    return rawData.filter(item => item.asset === r && getJour(item.dateDebut) === d)
                                  .reduce((sum, item) => sum + item.unavailable, 0);
                }),
                // Couleur automatique basée sur l'index
                backgroundColor: `hsl(${(index * 360) / reacteurs.length}, 70%, 50%)`
            }));

            // 3. Création du graphique empilé
            const ctx = document.getElementById('myChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dates,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    scales: {
                        x: { 
                            stacked: true // Force l'empilement sur l'axe X
                        },
                        y: { 
                            stacked: true, // Force l'empilement sur l'axe Y
                            beginAtZero: true,
                            title: { display: true, text: 'Puissance indisponible (MW)' }
                        }
                    },
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        } else {
            document.body.innerHTML = "<h2>Aucune donnée disponible.</h2><p>Veuillez lancer l'analyse sur la page principale d'abord.</p>";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Graphique des Indisponibilités</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/patternomaly"></script>
</head>
<body>
    <h2>Indisponibilités nucléaires cumulées par jour</h2>
    <div style="width: 90%; margin: auto; height: 500px;">
        <canvas id="myChart"></canvas>
    </div>

    <script>
        const dataJson = localStorage.getItem('graphData');
        
        if (dataJson) {
            const rawData = JSON.parse(dataJson);
            
            // Dictionnaire en MAJUSCULES pour correspondre au XML
            const configReacteurs = {
                "BELLEVILLE 1": { pattern: 'diagonal', color: '#FF306B' },
                "BELLEVILLE 2": { pattern: 'diagonal', color: '#FFACC4' },
                "BLAYAIS 1": { pattern: 'solid', color: '#636D01' },
                "BLAYAIS 2": { pattern: 'solid', color: '#8B9434' },
                "BLAYAIS 3": { pattern: 'solid', color: '#C5C999' },
                "BLAYAIS 4": { pattern: 'solid', color: '#E3EDA3' },
                "BUGEY 2": { pattern: 'solid', color: '#E62B60' },
                "BUGEY 3": { pattern: 'solid', color: '#FF83A6' },
                "BUGEY 4": { pattern: 'solid', color: '#E6AAAF' },
                "BUGEY 5": { pattern: 'solid', color: '#FFD6E1' },
                "CATTENOM 1": { pattern: 'disc', color: '#636D01' },
                "CATTENOM 2": { pattern: 'disc', color: '#8B9434' },
                "CATTENOM 3": { pattern: 'disc', color: '#C5C999' },
                "CATTENOM 4": { pattern: 'disc', color: '#E2E4CC' },
                "CHOOZ 1": { pattern: 'diagonal', color: '#2097E6' },
                "CHOOZ 2": { pattern: 'diagonal', color: '#7CCBFF' },
                "CRUAS 1": { pattern: 'disc', color: '#2E2900' },
                "CRUAS 2": { pattern: 'disc', color: '#5C5833' },
                "CRUAS 3": { pattern: 'disc', color: '#ADAB99' },
                "CRUAS 4": { pattern: 'disc', color: '#D6D5CC' },
                "GOLFECH 1": { pattern: 'solid', color: '#2097E6' },
                "GOLFECH 2": { pattern: 'solid', color: '#7CCBFF' },
                "NOGENT 1": { pattern: 'disc', color: '#5C5833' },
                "NOGENT 2": { pattern: 'disc', color: '#ADAB99' },
                "ST ALBAN 1": { pattern: 'solid', color: '#332E00' },
                "ST ALBAN 2": { pattern: 'solid', color: '#858266' },
                "TRICASTIN 1": { pattern: 'disc', color: '#E62B60' },
                "TRICASTIN 2": { pattern: 'disc', color: '#FF5989' },
                "TRICASTIN 3": { pattern: 'disc', color: '#FFACC4' },
                "TRICASTIN 4": { pattern: 'disc', color: '#E6AAAF' }
            };

            // A. Préparation de la fonction de formatage pour les filtres plus bas
            const getJour = (d) => new Date(d).toISOString().split('T')[0];

           // 1. On récupère la date brute et on isole uniquement le YYYY-MM-DD
const t2Stockee = localStorage.getItem('dateT2'); 
const datePart = t2Stockee.split('T')[0]; 

// 2. On crée l'objet date à partir de cette chaîne (interprété comme minuit UTC)
let dateRef = new Date(datePart);

// 3. On définit le point de départ : T2 - 1 jour
let dateDepart = new Date(dateRef);
dateDepart.setDate(dateRef.getDate() - 1); 

// 4. Génération des 22 jours à partir de ce point
let dates = [];
for (let i = 0; i < 22; i++) {
    let d = new Date(dateDepart);
    d.setDate(dateDepart.getDate() + i);
    dates.push(d.toISOString().split('T')[0]);
}
        
            // C. Définition fixe des réacteurs (ceux que vous avez configurés)
            const reacteurs = Object.keys(configReacteurs);
            
            const datasets = reacteurs.map(r => {
    const nomRecherche = r.toUpperCase().trim();
    const cfg = configReacteurs[nomRecherche] || { pattern: 'solid', color: '#808080' };
    
    let bg = cfg.color;
    // Vérification sécurisée du pattern
    if (typeof patternomaly !== 'undefined') {
        try { bg = patternomaly.draw(cfg.pattern, cfg.color); } catch(e) { console.error(e); }
    }

    return {
        label: r,
        data: dates.map(d => {
            let debutJour = new Date(d);
            debutJour.setHours(0, 0, 0, 0);
            let finJour = new Date(debutJour.getTime() + 86400000); 

            const evenementsDuJour = rawData.filter(i => {
                let debutEvt = new Date(i.dateDebut);
                let finEvt = new Date(i.dateFin);
                return i.asset.toUpperCase().trim() === r.toUpperCase().trim() && 
                       debutEvt < finJour && 
                       finEvt > debutJour;
            });

            if (evenementsDuJour.length === 0) return 0;

            let timeline = [];
            evenementsDuJour.forEach(e => {
                let debutEvt = new Date(e.dateDebut);
                let finEvt = new Date(e.dateFin);
                let mDebut = Math.max(0, Math.floor((debutEvt - debutJour) / 60000));
                let mFin = Math.min(1440, Math.ceil((finEvt - debutJour) / 60000));
                timeline.push({ m: mDebut, type: 1, val: Number(e.unavailable || 0) });
                timeline.push({ m: mFin, type: -1, val: Number(e.unavailable || 0) });
            });

            timeline.sort((a, b) => a.m - b.m || a.type - b.type);

            let picMax = 0;
            let courant = 0;
            timeline.forEach(step => {
                courant += (step.type * step.val);
                if (courant > picMax) picMax = courant;
            });

            return picMax;
        }),
        backgroundColor: bg
    };
});

            new Chart(document.getElementById('myChart'), {
                type: 'bar',
                data: { labels: dates, datasets: datasets },
               options: {
    scales: {
        x: {
            stacked: true // Obligatoire pour empiler les barres
        },
        y: {
    stacked: true,
    beginAtZero: true,
    suggestedMax: 10000,    // Plafond 10000 MW
    ticks: {
        stepSize: 1000
    }
}
    }
}
            });
        } else {
            document.body.innerHTML = "<h2>Aucune donnée.</h2>";
        }
    </script>
</body>
</html>

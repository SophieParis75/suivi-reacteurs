<script>
    const dataJson = localStorage.getItem('graphData');
    const body = document.body;

    if (!dataJson) {
        body.innerHTML += "<h3 style='color:red'>ERREUR : localStorage est VIDE.</h3>";
    } else {
        const rawData = JSON.parse(dataJson);
        body.innerHTML += "<p>Données trouvées ! Nombre d'éléments : " + rawData.length + "</p>";
        
        // On affiche les 3 premiers éléments pour voir s'ils sont lisibles
        const pre = document.createElement('pre');
        pre.textContent = JSON.stringify(rawData.slice(0, 3), null, 2);
        body.appendChild(pre);
    }
</script>
